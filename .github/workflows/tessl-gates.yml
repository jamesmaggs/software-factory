name: tessl gates

# Trunk-based: gate every push to main. The review gate is fast; the eval gate
# runs real agents in the cloud (minutes) and is the reason this lives in CI
# rather than in the pre-commit hook.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tessl-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      # Workspace API token — create with `tessl api-key create` and store it
      # as the TESSL_TOKEN repository secret.
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
      TESSL_REVIEW_THRESHOLD: "90"
      TESSL_EVAL_FLOOR: "80"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tessl CLI
        run: npm install -g @tessl/cli

      - name: Verify authentication
        run: tessl whoami

      - name: Review gate (lint + skill review)
        run: bash scripts/tessl-review-gate.sh

      - name: Eval gate (scenario evals)
        run: bash scripts/tessl-eval-gate.sh

  # Auto-bump changed skills and publish those ahead of the registry. Runs only
  # after the gates pass, on push to main. CI's GITHUB_TOKEN pushes don't trigger
  # new runs (and the bump commit carries [skip ci]), so this cannot loop.
  publish:
    needs: gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tessl CLI
        run: npm install -g @tessl/cli

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-bump and publish changed skills
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash scripts/tessl-publish.sh
