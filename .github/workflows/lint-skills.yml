name: lint skills

# Backstop for the local pre-commit hook: lint every SKILL.md against the
# Agent Skills spec on push to main. Deterministic and offline — no secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint SKILL.md files
        # Top-level skills only — evals/files/* hold intentionally malformed fixtures.
        run: |
          status=0
          for skill_md in skills/*/SKILL.md; do
            [ -e "$skill_md" ] || continue
            bash skills/skill-linter/scripts/lint_skill.sh "$skill_md" || status=1
          done
          exit "$status"
